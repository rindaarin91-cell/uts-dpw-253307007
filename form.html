<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Isi Formulir — Portal PPDB Aurora International School</title>
  <link rel="stylesheet" href="asset/css/style.css" />
</head>
<body>

  <header>
    <h1> Aurora International School</h1>
    <p class="subtitle">Portal Penerimaan Peserta Didik Baru — Tahun Ajaran 2026/2027</p>
  </header>

  <nav>
    <a href="index.html">Beranda</a>
    <a href="alur.html">Alur Pendaftaran</a>
    <a href="form.html" class="active">Isi Formulir</a>
  </nav>

  <main>
    <div class="card">
      <h2>Formulir Biodata Calon Siswa</h2>
      <p>Mohon isi data berikut dengan benar sesuai dengan dokumen asli yang dimiliki.</p>

      <form id="formPendaftaran" onsubmit="return false;">

        <div class="form-group">
          <label for="nama">Nama Lengkap Sesuai Ijazah / Akta</label>
          <input
            type="text"
            id="nama"
            name="nama"
            placeholder="Cth: Arinda Mardianti"
            autocomplete="off"
          />
        </div>

        <div class="form-group">
          <label for="nik">Nomor Induk Kependudukan (NIK — 16 Digit)</label>
          <input
            type="number"
            id="nik"
            name="nik"
            placeholder="Masukkan 16 digit NIK"
            autocomplete="off"
          />
        </div>

        <div class="form-group">
          <label for="jalur">Jalur Pendaftaran</label>
          <select id="jalur" name="jalur">
            <option value="pilih">-- Pilih Jalur --</option>
            <option value="zonasi">Zonasi</option>
            <option value="prestasi">Prestasi</option>
            <option value="afirmasi">Afirmasi</option>
            <option value="mutasi">Perpindahan Tugas Orang Tua / Mutasi</option>
          </select>
        </div>

        <button type="button" class="btn-submit" onclick="handleSubmit()">
          Kirim Pendaftaran
        </button>

      </form>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 <span>Arinda Mardianti</span>. 253307007.</p>
  </footer>

  <div id="toast"></div>
  <script src="asset/javascript/script.js"></script>
</body>
</html>
